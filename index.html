<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        /* BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #abe6ff 0%, #8b87db 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        /* HIDDEN STATE */
        .hidden {
            display: none !important;
        }

        /* SCREEN 1: THE WELCOME */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
            padding: 20px;
        }

        .main-heart {
            color: #5a86ff;
            font-size: 100px;
            /* Glowing effect */
            filter: drop-shadow(0 0 15px #667dff);
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 0.75s infinite ease-in-out;
        }
         @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
         }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        h1 span { color: #179cef; }
        p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }

        .open-btn {
            background-color:  #b6c3ff;
            color: rgb(0, 0, 0);
            border: 1px solid #9d7de3;
            padding: 12px 45px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .open-btn:hover { background-color: #9492f4;
            box-shadow: 0 0 20px rgba(130, 12, 233, 0.6);
            transform: translateY(-2px); }

        /* SCREEN 2: THE ENVELOPE */
        .envelope-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The Box behind the envelope */
        .envelope-box {
            width: 220px;
            height: 220px;
            background-color: rgba(40, 5, 25, 0.6);
            border: 1px solid rgba(255, 51, 153, 0.3);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* The Envelope Icon (SVG for sharpness) */
        .envelope-icon {
            width: 100px;
            height: 80px;
            fill: none;
            stroke: #fab8d9;
            stroke-width: 2;
        }

        /* The floating small heart badge */
        .heart-badge {
            position: absolute;
            top: -15px;
            right: -15px;
            background: linear-gradient(135deg, #ff66b2, #9933ff);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .tap-text {
            margin-top: 30px;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #ec0c7c;
            opacity: 0.8;
        }
        .startPage{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
    }

    .mailBox{
        width:230px;
        height:230px;
        border-radius:30px;
        background:#250015;
        border:2px solid rgba(255,0,150,0.3);
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:90px;
        color:#7a1663;
        box-shadow:0 0 35px rgba(255,0,150,0.25);
        cursor:pointer;
        transition:0.3s;
        position:relative;
    }

    .mailBox:hover{
        transform:scale(1.05);
    }

    .smallHeart{
        position:absolute;
        top:-18px;
        right:-18px;
        width:60px;
        height:60px;
        border-radius:50%;
        background:linear-gradient(145deg,#ff54dc,#c962ff);
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:25px;
        box-shadow:0 0 20px #ff54dc;
    }

    .tap{
        margin-top:25px;
        font-size:26px;
        color:#850766;
    }

    #letterPage{
        display:none;
    }

       
    </style>
</head>
<body>

    <div id="screen1" class="container">
        <div class="main-heart">♥</div>
        <h1>Hey <span>CHINNUU</span></h1>
        <p><b>goooddd morning baby gurlllll..</b></p>
        <button class="open-btn" onclick="showEnvelope()">click here for surprise &rarr;</button>
    </div>

    <div id="screen2" class="envelope-container hidden">
        <div class="envelope-box"
        onclick="openPage()">
            <div class="heart-badge">🤍</div>
            
            <svg class="envelope-icon" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
        </div>
        <p class="tap-text">tap one the envelope SWEEETIEEE</p>
    </div>
    <script>
        function openPage(){
                window.location.href = "2nd.html";
        
        }
        // Function to switch screens
        function showEnvelope() {
            
                document.getElementById('screen1').classList.add('hidden');
                document.getElementById('screen2').classList.remove('hidden');
        }
        
        
    </script>
</body>
</html>
