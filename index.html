<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        /* BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #ffbbfa 0%, #ce7eff 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        /* HIDDEN STATE */
        .hidden {
            display: none !important;
        }

        /* SCREEN 1: THE WELCOME */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 400px;
            padding: 20px;
        }

        .main-heart {
            color: #fefefe;
            font-size: 100px;
            /* Glowing effect */
            filter: drop-shadow(0 0 15px #f8ff91);
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 0.75s infinite ease-in-out;
        }
         @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
         }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        h1 span { color: #179cef; }
        p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; }

        .open-btn {
            background-color:  #b6c3ff;
            color: rgb(0, 0, 0);
            border: 1px solid #9d7de3;
            padding: 12px 45px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .open-btn:hover { background-color: #9492f4;
            box-shadow: 0 0 20px rgba(196, 130, 255, 0.6);
            transform: translateY(-2px); }

         

        .image-box{
            width:300px;
            height:300px;
            border-radius:20px;
            overflow:hidden;
            cursor:pointer;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .image-box:hover{
            transform:scale(1.05);
        }

        .image-box img{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        
        
        .tap-text {
            margin-top: 30px;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #ec0c7c;
            opacity: 0.8;
        }
        .startPage{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        }

    

    
    

    .tap{
         margin-top: 30px;
        font-size:x-large;
        letter-spacing: 1px;
        color: #fe0c85;
        opacity: 0.8;
        margin-top:25px;
        font-size:26px;
        font-family: Arial, Helvetica, sans-serif;
        -webkit-text-stroke:1px #000000;
    }

    #letterPage{
        display:none;
    }
    

       
    </style>
</head>
<body>

    <div id="screen1" class="container">
        <div class="main-heart">💗</div>
        <h1>YOUR <span>GRACE</span></h1>
        <p><b>goooddd morning MY LORD </b></p>
        <button class="open-btn" onclick="showEnvelope()">click here for surprise &rarr;</button>
    </div>

    <div id="screen2" class="envelope-container hidden">
         <div class="image-box" onclick="openPage()">
        <!-- Replace image.jpg with your image -->
        <img src="flower.jpeg" alt="Click Image">
    </div>
    <p class="tap"><b>tap on it</b></p>
    <script>
        
        function openPage(){
            window.location.href = "2nd.html";
        
        }
        // Function to switch screens
        function showEnvelope() {
            
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
        }
        
    </script>
    
</body>
</html>
